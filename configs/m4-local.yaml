# Benchmark the small-model roster served by mlx_lm.server on the M4 Pro over Tailscale.
# Start the server(s) first, e.g. on the M4:
#   uv run mlx_lm.server --model mlx-community/Qwen2.5-Coder-3B-Instruct-4bit \
#       --host 100.101.97.59 --port 8080
# mlx_lm.server can serve any cached model via per-request model selection, so a single
# endpoint can cover all three models below.
samples: 1
temp: 0.0
max_tokens: 1024

tasks_root: tasks
# task_glob: ["custom/*"]   # uncomment to restrict

solvers: ["single_agent"]

deployments:
  - kind: openai_compat
    name: mlx_m4
    base_url: "http://100.101.97.59:8080/v1"
    models:
      - mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      - mlx-community/Qwen2.5-Coder-3B-Instruct-4bit
      - mlx-community/Qwen3-1.7B-4bit

executor:
  kind: subprocess
  test_timeout_s: 15
  parity_timeout_s: 30
  perf_timeout_s: 60
  mem_limit_mb: 1024
  perf_mem_limit_mb: 2048
